name: Deploy Application to EC2

on:
  workflow_run:
    workflows: ["Build and Push Docker Image to Amazon ECR"]
    types:
      - completed

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: aws-two-tier-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Deploy via SSM
        run: |

          aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Name,Values=aws-two-tier-app-instance" \
          --parameters commands='[
          "docker login -u AWS -p $(aws ecr get-login-password --region eu-west-1) 100038279691.dkr.ecr.eu-west-1.amazonaws.com",
          "docker pull 100038279691.dkr.ecr.eu-west-1.amazonaws.com/aws-two-tier-app:latest",
          "docker stop aws-two-tier-app || true",
          "docker rm aws-two-tier-app || true",
          "docker run -d --name aws-two-tier-app -p 5000:5000 --restart always 100038279691.dkr.ecr.eu-west-1.amazonaws.com/aws-two-tier-app:latest"
          ]' \
          --region eu-west-1
